services:
  - type: web
    name: green-a
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      # Core app settings
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0

      # YouTube enrichment
      - key: YOUTUBE_API_KEY
        sync: false

      # OCR / video analysis
      - key: VIDEO_ANALYSIS_PROVIDER
        value: hybrid
      - key: AZURE_VIDEO_INDEXER_BASE_URL
        value: https://api.videoindexer.ai
      - key: AZURE_VIDEO_INDEXER_ACCOUNT_ID
        sync: false
      - key: AZURE_VIDEO_INDEXER_LOCATION
        sync: false
      - key: AZURE_VIDEO_INDEXER_ACCESS_TOKEN
        sync: false
      - key: AZURE_VIDEO_INDEXER_SUBSCRIPTION_KEY
        sync: false
      - key: AZURE_VIDEO_INDEXER_LANGUAGE
        value: AutoDetect
      - key: AZURE_VIDEO_INDEXER_POLL_MS
        value: "7000"
      - key: AZURE_VIDEO_INDEXER_MAX_POLLS
        value: "22"
      - key: AZURE_VIDEO_INDEXER_TIMEOUT_MS
        value: "30000"

      # Visual analysis via Qwen-VL
      - key: VISION_ANALYSIS_PROVIDER
        value: hybrid
      - key: QWEN_VL_API_KEY
        sync: false
      - key: QWEN_VL_BASE_URL
        value: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - key: QWEN_VL_MODEL
        value: qwen3-vl-plus
      - key: QWEN_VL_MAX_FRAMES
        value: "8"
      - key: QWEN_VL_TIMEOUT_MS
        value: "30000"
      - key: QWEN_VL_MAX_IMAGE_WIDTH
        value: "1280"
      - key: QWEN_VL_MIN_SCENE_GAP_SECONDS
        value: "20"

      # AI educational-format analysis via OpenAI
      - key: AI_ANALYSIS_PROVIDER
        value: hybrid
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_MS
        value: "30000"
      - key: AI_ANALYSIS_MAX_TRANSCRIPT_WORDS
        value: "5000"
