services:
  - type: web
    name: green-a
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: YOUTUBE_API_KEY
        fromEnv: YOUTUBE_API_KEY
